<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>

<body style="background-color: #212121; color:white;">
    <ul class="language">
        <li>
            Javascript
        </li>
    </ul>
</body>
<script>
    // const li=document.createElement('li')
    // li.innerHTML=`${langName}`
    // const newLang=document.querySelector('.language').append(li)
    // //document.body.append(app)
    // console.log(newLang)

    function addLangauage(langName) {
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        const newLang = document.querySelector('.language').appendChild(li)
        //document.body.append(app)
        console.log(newLang)

    }
    addLangauage("python")
    addLangauage("typescript")

    function addOptiLanguage(langName) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName));
        document.querySelector('.language').appendChild(li)
        
    }
    addOptiLanguage('GoLang')

    //Edit
    const secondLang=document.querySelector('li:nth-child(2)')
    //console.log(secondLang)
    const newli=document.createElement('li')
    newli.appendChild(document.createTextNode("Node.js"))
    secondLang.replaceWith(newli)

    //remove
    const lastLang=document.querySelector('li:last-child')
    lastLang.remove()
    
</script>

</html>
