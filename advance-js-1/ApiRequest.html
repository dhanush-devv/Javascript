<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            margin-top: 10px;
            height: 400px;
            width: 400px;
            background-color: aqua;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;


        }

        .photo {
            height: 300px;
            width: 100%;
            background-color: antiquewhite;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            
            
        }
    </style>
</head>

<body style="background-color: #212121; color: white;">
    <input type="text" id="username" placeholder="Enter your github username">
    <button onclick="getInfo()">Get Info</button>
    <div class="card">
        <div class="photo">
            <img src="" id="profilePic" alt="photo">
        </div>
        <h1 id="name"></h1>
        <h1 id="follower"></h1>
    </div>
    
</body>
<script>
    function getInfo() {
        let username = document.getElementById('username').value
        console.log(username)


        fetch(`https://api.github.com/users/${username}`)
            .then((res) => {
                return res.json()
            })
            .then((data) => {
                document.getElementById('profilePic').src=data.avatar_url
                 document.getElementById('profilePic').style.width='100%'
                 document.getElementById('profilePic').style.height='100%'
                  document.getElementById('profilePic').style.borderRadius='10px'

                document.getElementById('name').innerText = data.name;

                document.getElementById('follower').textContent = data.follower;

                console.log(data);
            })
            .catch((error) => {
                console.log(error)
            })
    }
</script>

</html>
